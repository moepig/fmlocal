name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  save-pr-number:
    name: Save PR Number
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Save PR number to artifact
        run: echo "${{ github.event.number }}" > pr_number.txt

      - uses: actions/upload-artifact@v7
        with:
          name: pr-number
          path: pr_number.txt


  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run unit tests
        run: go test -short ./internal/...

  e2e-test:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run e2e tests
        run: go test ./test/e2e/...
